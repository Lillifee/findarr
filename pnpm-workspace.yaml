packages:
  - packages/*
  - apps/*

allowBuilds:
  better-sqlite3: true
  esbuild: true

catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: ^0.1.23
  typescript: ^6.0.3

overrides:
  vite: 'catalog:'
  vitest: 'catalog:'

peerDependencyRules:
  allowAny:
    - vite
    - vitest

  allowedVersions:
    vite: '*'
    vitest: '*'
